server:
  port: 8080
  servlet:
    context-path: /api
    #cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
spring:
  application:
    name: picture-backend
    #数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/my_picture
    username: #数据库账号
    password: #数据库密码
    #redis配置
  redis:
    database: 1
    host: 127.0.0.1
    port: 6379
    timeout: 5000
  #Session 配置
  session:
    store-type: redis
    #session 30 天后过期
    timeout: 2592000
  #开放更大的文件上传体积
  servlet:
    multipart:
      max-file-size: 10MB
mybatis-plus:
  configuration:
    # MyBatis 配置
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted # 全局逻辑删除字段名(deleted为实体类属性名称)
      logic-delete-value: 1 # 逻辑已删除值。可选，默认值为 1
      logic-not-delete-value: 0 # 逻辑未删除值。可选，默认值为 0
knife4j:
  enable: true
  openapi:
    title: 接口文档
    version: v1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.yang.picturebackend.controller
#对象存储配置
cos:
  client:
    host:
    secretId:
    secretKey:
    region:
    bucket:
